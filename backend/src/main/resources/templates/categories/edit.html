<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .active {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border-radius: 0.375rem;
        }
        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0.375rem;
        }
        .entity-link {
            color: #6c757d;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
        }
        .entity-link:hover {
            background-color: #e9ecef;
        }
        .entity-link.active {
            background-color: #007bff;
            color: white !important;
        }
    </style>
</head>
<body>
<header class="bg-dark text-white py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2" onclick="window.location.href='/'" style="cursor: pointer;">
            <span class="fs-4 fw-bold text-warning">ExpenseTracker</span>
        </div>

        <nav>
            <ul class="nav">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Статистика</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/categories">Админка</a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<div class="container mt-3">
    <div class="border-bottom pb-2">
        <a href="/categories" class="entity-link me-2">Категории</a>
        <a href="/type-payments" class="entity-link me-2" >Типы оплаты</a>
        <a href="/costs" class="entity-link">Расходы</a>
    </div>
</div>
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Редактирование категории</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/categories/{id}(id=${category.id})}" th:object="${category}" method="post">
                <input type="hidden" name="_method" value="PUT">

                <div class="mb-3">
                    <label for="name" class="form-label">Название</label>
                    <input type="text" class="form-control" th:field="*{name}" id="name">
                    <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="color" class="form-label">Цвет</label>
                    <input type="color" class="form-control form-control-color" th:field="*{color}" id="color" style="width: 100%; height: 40px;">
                    <div class="text-danger" th:if="${#fields.hasErrors('color')}" th:errors="*{color}"></div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea class="form-control" th:field="*{description}" id="description" rows="4"></textarea>
                    <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/categories" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
