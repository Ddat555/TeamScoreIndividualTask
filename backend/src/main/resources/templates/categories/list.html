<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Категории</h1>

    <!-- Поиск -->
    <div class="card mb-3">
        <div class="card-body">
            <form action="/categories/search" method="get" class="row g-3">
                <div class="col-md-6">
                    <input type="text" name="name" class="form-control" placeholder="Поиск категории по названию" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary">Найти</button>
                    <a href="/categories" class="btn btn-secondary">Сброс</a>
                </div>
            </form>
        </div>
    </div>

    <a href="/categories/new" class="btn btn-primary mb-3">Добавить категорию</a>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Цвет</th>
            <th>Описание</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.id}">1</td>
            <td th:text="${category.name}">Еда</td>
            <td>
                <span class="badge" th:style="'background-color: ' + ${category.color}" th:text="${category.color}">#FF0000</span>
            </td>
            <td th:text="${category.description}">Описание</td>
            <td>
                <a th:href="@{/categories/{id}(id=${category.id})}" class="btn btn-sm btn-info">Просмотр</a>
                <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-sm btn-warning">Изменить</a>
                <form th:action="@{/categories/{id}(id=${category.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</button>
                </form>
            </td>
        </tr>
        <tr th:if="${categories.isEmpty()}">
            <td colspan="5" class="text-center">Нет категорий</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
