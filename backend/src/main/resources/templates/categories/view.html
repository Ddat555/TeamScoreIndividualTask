<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .active {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border-radius: 0.375rem;
        }
        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0.375rem;
        }
        .entity-link {
            color: #6c757d;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
        }
        .entity-link:hover {
            background-color: #e9ecef;
        }
        .entity-link.active {
            background-color: #007bff;
            color: white !important;
        }
    </style>
</head>
<body>
<header class="bg-dark text-white py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2" onclick="window.location.href='/'" style="cursor: pointer;">
            <span class="fs-4 fw-bold text-warning">ExpenseTracker</span>
        </div>

        <nav>
            <ul class="nav">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Статистика</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/categories">Админка</a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<div class="container mt-3">
    <div class="border-bottom pb-2">
        <a href="/categories" class="entity-link me-2">Категории</a>
        <a href="/type-payments" class="entity-link me-2" >Типы оплаты</a>
        <a href="/costs" class="entity-link">Расходы</a>
    </div>
</div>
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Информация о категории</h2>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">ID:</div>
                <div class="col-sm-9" th:text="${category.id}"></div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Название:</div>
                <div class="col-sm-9" th:text="${category.name}"></div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Цвет:</div>
                <div class="col-sm-9">
                    <span class="badge" th:style="'background-color: ' + ${category.color}" th:text="${category.color}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Описание:</div>
                <div class="col-sm-9" th:text="${category.description}">Продукты питания и напитки</div>
            </div>

            <div class="row mt-4">
                <div class="col">
                    <a href="/categories" class="btn btn-secondary">Назад к списку</a>
                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-warning">Редактировать</a>
                    <form th:action="@{/categories/{id}(id=${category.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="_method" value="DELETE">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Точно удалить?')">Удалить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
