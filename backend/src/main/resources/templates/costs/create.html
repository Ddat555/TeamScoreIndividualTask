<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание расхода</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div th:replace="fragments/admin-nav :: admin-nav"></div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Создание расхода</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/costs}" th:object="${cost}" method="post">
                <div class="mb-3">
                    <label for="sellerName" class="form-label">Продавец</label>
                    <input type="text" class="form-control" th:field="*{sellerName}" id="sellerName">
                    <div class="text-danger" th:if="${#fields.hasErrors('sellerName')}" th:errors="*{sellerName}"></div>
                </div>

                <div class="mb-3">
                    <label for="sum" class="form-label">Сумма</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{sum}" id="sum">
                    <div class="text-danger" th:if="${#fields.hasErrors('sum')}" th:errors="*{sum}"></div>
                </div>

                <select class="form-control" th:field="*{typePaymentId}" id="typePayment">
                    <option value="">Выберите тип оплаты</option>
                    <option th:each="type : ${typePayments}" th:value="${type.id}" th:text="${type.name}"></option>
                </select>

                <div th:each="cat : ${categories}" class="form-check">
                    <input type="checkbox" class="form-check-input"
                           th:field="*{categoryIds}"
                           th:value="${cat.id}"
                           th:id="'cat_' + ${cat.id}">
                    <label class="form-check-label" th:for="'cat_' + ${cat.id}"
                           th:text="${cat.name} + ' (' + ${cat.color} + ')'"></label>
                </div>

                <button type="submit" class="btn btn-primary">Создать</button>
                <a href="/costs" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
