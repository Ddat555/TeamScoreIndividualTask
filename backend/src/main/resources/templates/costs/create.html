<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание расхода</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .entity-link {
            color: #6c757d;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
        }
        .entity-link:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>
<header class="bg-dark text-white py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2" onclick="window.location.href='/'" style="cursor: pointer;">
            <span class="fs-4 fw-bold text-warning">ExpenseTracker</span>
        </div>
        <nav>
            <ul class="nav">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Статистика</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/categories">Админка</a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<div class="container mt-3">
    <div class="border-bottom pb-2">
        <a href="/categories" class="entity-link me-2">Категории</a>
        <a href="/type-payments" class="entity-link me-2">Типы оплаты</a>
        <a href="/costs" class="entity-link">Расходы</a>
    </div>
</div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Создание расхода</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/costs}" th:object="${cost}" method="post">
                <div class="mb-3">
                    <label for="sellerName" class="form-label">Продавец</label>
                    <input type="text" class="form-control" th:field="*{sellerName}" id="sellerName">
                    <div class="text-danger" th:if="${#fields.hasErrors('sellerName')}" th:errors="*{sellerName}"></div>
                </div>

                <div class="mb-3">
                    <label for="sum" class="form-label">Сумма</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{sum}" id="sum">
                    <div class="text-danger" th:if="${#fields.hasErrors('sum')}" th:errors="*{sum}"></div>
                </div>

                <select class="form-control" th:field="*{typePaymentId}" id="typePayment">
                    <option value="">Выберите тип оплаты</option>
                    <option th:each="type : ${typePayments}" th:value="${type.id}" th:text="${type.name}"></option>
                </select>

                <div th:each="cat : ${categories}" class="form-check">
                    <input type="checkbox" class="form-check-input"
                           th:field="*{categoryIds}"
                           th:value="${cat.id}"
                           th:id="'cat_' + ${cat.id}">
                    <label class="form-check-label" th:for="'cat_' + ${cat.id}"
                           th:text="${cat.name} + ' (' + ${cat.color} + ')'"></label>
                </div>

                <button type="submit" class="btn btn-primary">Создать</button>
                <a href="/costs" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
