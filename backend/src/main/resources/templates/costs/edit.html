<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование расхода</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Редактирование расхода</h2>
        </div>

        ```
        <div class="card-body">

            <form th:action="@{/costs/{id}(id=${cost.id})}"
                  th:object="${cost}"
                  method="post">

                <input type="hidden" name="_method" value="PUT"/>

                <div class="mb-3">
                    <label class="form-label">Продавец</label>
                    <input type="text" class="form-control" th:field="*{sellerName}">
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('sellerName')}"
                         th:errors="*{sellerName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Сумма</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{sum}">
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('sum')}"
                         th:errors="*{sum}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Тип оплаты</label>
                    <select class="form-control" th:field="*{typePaymentId}">
                        <option value="">Выберите тип оплаты</option>
                        <option th:each="type : ${typePayments}"
                                th:value="${type.id}"
                                th:text="${type.name}">
                        </option>
                    </select>

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('typePaymentId')}"
                         th:errors="*{typePaymentId}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Категории</label>

                    <div th:each="cat : ${categories}" class="form-check">
                        <input type="checkbox"
                               class="form-check-input"
                               th:field="*{categoryIds}"
                               th:value="${cat.id}"
                               th:id="'cat_' + ${cat.id}">

                        <label class="form-check-label"
                               th:for="'cat_' + ${cat.id}"
                               th:text="${cat.name} + ' (' + ${cat.color} + ')'">
                        </label>
                    </div>

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('categoryIds')}"
                         th:errors="*{categoryIds}"></div>
                </div>

                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/costs" class="btn btn-secondary">Отмена</a>

            </form>
        </div>
    </div>
    ```

</div>

</body>
</html>
