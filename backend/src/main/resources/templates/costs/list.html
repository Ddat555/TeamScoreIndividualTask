<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Расходы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .entity-link {
            color: #6c757d;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
        }
        .entity-link:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>
<header class="bg-dark text-white py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2" onclick="window.location.href='/'" style="cursor: pointer;">
            <span class="fs-4 fw-bold text-warning">ExpenseTracker</span>
        </div>
        <nav>
            <ul class="nav">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Статистика</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/categories">Админка</a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<div class="container mt-3">
    <div class="border-bottom pb-2">
        <a href="/categories" class="entity-link me-2">Категории</a>
        <a href="/type-payments" class="entity-link me-2">Типы оплаты</a>
        <a href="/costs" class="entity-link">Расходы</a>
    </div>
</div>

<div class="container mt-4">
    <h1>Расходы</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card mb-3">
        <div class="card-body">
            <form action="/costs/search" method="get" class="row g-3">
                <div class="col-md-6">
                    <input type="number" name="id" class="form-control" placeholder="Поиск расхода по ID" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary">Найти</button>
                    <a href="/costs" class="btn btn-secondary">Сброс</a>
                </div>
            </form>
        </div>
    </div>

    <a href="/costs/new" class="btn btn-primary mb-3">Добавить расход</a>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Продавец</th>
            <th>Сумма</th>
            <th>Дата</th>
            <th>Тип оплаты</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cost : ${costs}">
            <td th:text="${cost.id}">1</td>
            <td th:text="${cost.sellerName}">Магазин</td>
            <td th:text="${cost.sum}">100.50</td>
            <td th:text="${#temporals.format(cost.dateTimePay, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</td>
            <td th:text="${cost.typePayment.name}">Наличные</td>
            <td>
                <a th:href="@{/costs/{id}(id=${cost.id})}" class="btn btn-sm btn-info">Просмотр</a>
                <a th:href="@{/costs/edit/{id}(id=${cost.id})}" class="btn btn-sm btn-warning">Изменить</a>
                <form th:action="@{/costs/{id}(id=${cost.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</button>
                </form>
            </td>
        </tr>
        <tr th:if="${costs.isEmpty()}">
            <td colspan="6" class="text-center">Нет расходов</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
