<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поиск расхода</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .entity-link {
            color: #6c757d;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
        }
        .entity-link:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>
<header class="bg-dark text-white py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2" onclick="window.location.href='/'" style="cursor: pointer;">
            <span class="fs-4 fw-bold text-warning">ExpenseTracker</span>
        </div>
        <nav>
            <ul class="nav">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Статистика</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/categories">Админка</a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<div class="container mt-3">
    <div class="border-bottom pb-2">
        <a href="/categories" class="entity-link me-2">Категории</a>
        <a href="/type-payments" class="entity-link me-2">Типы оплаты</a>
        <a href="/costs" class="entity-link">Расходы</a>
    </div>
</div>

<div class="container mt-4">
    <h1>Поиск расхода</h1>

    <div class="card mb-4">
        <div class="card-body">
            <form action="/costs/search" method="get" class="row g-3">
                <div class="col-md-6">
                    <input type="number" name="id" class="form-control" placeholder="Введите ID" th:value="${param.id}" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary">Найти</button>
                    <a href="/costs" class="btn btn-secondary">Назад</a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${cost}" class="card">
        <div class="card-header">
            <h3>Результат поиска</h3>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">ID:</div>
                <div class="col-sm-9" th:text="${cost.id}">1</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Продавец:</div>
                <div class="col-sm-9" th:text="${cost.sellerName}">Магазин</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Сумма:</div>
                <div class="col-sm-9" th:text="${cost.sum}">100.50</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Дата:</div>
                <div class="col-sm-9" th:text="${#temporals.format(cost.dateTimePay, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Тип оплаты:</div>
                <div class="col-sm-9" th:text="${cost.typePayment.name}">Наличные</div>
            </div>

            <div class="row mt-4">
                <div class="col">
                    <a th:href="@{/costs/{id}(id=${cost.id})}" class="btn btn-info">Подробнее</a>
                    <a th:href="@{/costs/edit/{id}(id=${cost.id})}" class="btn btn-warning">Редактировать</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${param.id != null and cost == null and error == null}" class="alert alert-info">
        Расход с ID <strong th:text="${param.id}"></strong> не найден
    </div>
</div>
</body>
</html>
