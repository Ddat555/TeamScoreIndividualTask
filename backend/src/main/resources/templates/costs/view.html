<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Просмотр расхода</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div th:replace="fragments/admin-nav :: admin-nav"></div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Информация о расходе</h2>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">ID:</div>
                <div class="col-sm-9" th:text="${cost.id}">1</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Продавец:</div>
                <div class="col-sm-9" th:text="${cost.sellerName}">Магазин</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Сумма:</div>
                <div class="col-sm-9" th:text="${cost.sum}">100.50</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Дата:</div>
                <div class="col-sm-9" th:text="${#temporals.format(cost.dateTimePay, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Тип оплаты:</div>
                <div class="col-sm-9" th:text="${cost.typePayment.name}">Наличные</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Категории:</div>
                <div class="col-sm-9">
                    <span th:each="cat : ${cost.categories}" class="badge bg-secondary me-1" th:text="${cat.name}">Еда</span>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col">
                    <a href="/costs" class="btn btn-secondary">Назад к списку</a>
                    <a th:href="@{/costs/edit/{id}(id=${cost.id})}" class="btn btn-warning">Редактировать</a>
                    <form th:action="@{/costs/{id}(id=${cost.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="_method" value="DELETE">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Удалить?')">Удалить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
