<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .active {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border-radius: 0.375rem;
        }
        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0.375rem;
        }
        .entity-link {
            color: #6c757d;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
        }
        .entity-link:hover {
            background-color: #e9ecef;
        }
        .entity-link.active {
            background-color: #007bff;
            color: white !important;
        }
    </style>
</head>
<body>
<header class="bg-dark text-white py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2" onclick="window.location.href='/'" style="cursor: pointer;">
            <span class="fs-4 fw-bold text-warning">ExpenseTracker</span>
        </div>

        <nav>
            <ul class="nav">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Статистика</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/categories">Админка</a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<div class="container mt-3">
    <div class="border-bottom pb-2">
        <a href="/categories" class="entity-link me-2">Категории</a>
        <a href="/type-payments" class="entity-link me-2" >Типы оплаты</a>
        <a href="/costs" class="entity-link">Расходы</a>
    </div>
</div>
<div class="container mt-4">
    <h1>Типы оплаты</h1>



    <a href="/type-payments/new" class="btn btn-primary mb-3">Добавить тип оплаты</a>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="type : ${typePayments}">
            <td th:text="${type.id}">1</td>
            <td th:text="${type.name}">Наличные</td>
            <td>
                <a th:href="@{/type-payments/{id}(id=${type.id})}" class="btn btn-sm btn-info">Просмотр</a>
                <a th:href="@{/type-payments/edit/{id}(id=${type.id})}" class="btn btn-sm btn-warning">Изменить</a>
                <form th:action="@{/type-payments/{id}(id=${type.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</button>
                </form>
            </td>
        </tr>
        <tr th:if="${typePayments.isEmpty()}">
            <td colspan="3" class="text-center">Нет типов оплаты</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
