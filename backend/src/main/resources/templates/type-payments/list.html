<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div th:replace="fragments/admin-nav :: admin-nav"></div>
<div class="container mt-4">
    <h1>Типы оплаты</h1>



    <a href="/type-payments/new" class="btn btn-primary mb-3">Добавить тип оплаты</a>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="type : ${typePayments}">
            <td th:text="${type.id}">1</td>
            <td th:text="${type.name}">Наличные</td>
            <td>
                <a th:href="@{/type-payments/{id}(id=${type.id})}" class="btn btn-sm btn-info">Просмотр</a>
                <a th:href="@{/type-payments/edit/{id}(id=${type.id})}" class="btn btn-sm btn-warning">Изменить</a>
                <form th:action="@{/type-payments/{id}(id=${type.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</button>
                </form>
            </td>
        </tr>
        <tr th:if="${typePayments.isEmpty()}">
            <td colspan="3" class="text-center">Нет типов оплаты</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
