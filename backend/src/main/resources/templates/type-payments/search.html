<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div th:replace="fragments/admin-nav :: admin-nav"></div>
<div class="container mt-4">
    <h1>Поиск типа оплаты</h1>

    <div class="card mb-4">
        <div class="card-body">
            <form action="/type-payments/search" method="get" class="row g-3">
                <div class="col-md-6">
                    <input type="text" name="name" class="form-control" placeholder="Введите название" th:value="${param.name}" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary">Найти</button>
                    <a href="/type-payments" class="btn btn-secondary">Назад</a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${typePayment}" class="card">
        <div class="card-header">
            <h3>Результат поиска</h3>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">ID:</div>
                <div class="col-sm-9" th:text="${typePayment.id}">1</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Название:</div>
                <div class="col-sm-9" th:text="${typePayment.name}">Наличные</div>
            </div>

            <div class="row mt-4">
                <div class="col">
                    <a th:href="@{/type-payments/{id}(id=${typePayment.id})}" class="btn btn-info">Подробнее</a>
                    <a th:href="@{/type-payments/edit/{id}(id=${typePayment.id})}" class="btn btn-warning">Редактировать</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${param.name != null and typePayment == null and error == null}" class="alert alert-info">
        Ничего не найдено по запросу: <strong th:text="${param.name}"></strong>
    </div>
</div>
</body>
</html>
