<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Информация о типе оплаты</h2>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">ID:</div>
                <div class="col-sm-9" th:text="${typePayment.id}">1</div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-3 fw-bold">Название:</div>
                <div class="col-sm-9" th:text="${typePayment.name}">Наличные</div>
            </div>

            <div class="row mt-4">
                <div class="col">
                    <a href="/type-payments" class="btn btn-secondary">Назад к списку</a>
                    <a th:href="@{/type-payments/edit/{id}(id=${typePayment.id})}" class="btn btn-warning">Редактировать</a>
                    <form th:action="@{/type-payments/{id}(id=${typePayment.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="_method" value="DELETE">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Удалить?')">Удалить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
