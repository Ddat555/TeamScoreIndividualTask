services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: individualTask
      POSTGRES_USER: server
      POSTGRES_PASSWORD: server
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./data.sql:/docker-entrypoint-initdb.d/2-data.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U server -d individualTask"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: spring_app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_ADDRESS: postgres
      DB_PORT: 5432
      DB_NAME: individualTask
      DB_USER: server
      DB_PASSWORD: server
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network: