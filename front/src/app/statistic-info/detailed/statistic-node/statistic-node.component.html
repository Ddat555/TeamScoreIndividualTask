<div class="card mb-2">
  <div class="card-body py-2">
    <div class="d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <span *ngIf="index !== undefined" class="badge bg-secondary">
          {{ index }}
        </span>
        <span>{{ statistic.name }}</span>
        <span class="badge bg-light text-dark border">
          {{ statistic.totalSum }} ₽
        </span>
      </div>
      <span *ngIf="showPercentage && statistic.percentage !== undefined" class="fw-bold">
        {{ statistic.percentage }}%
      </span>
    </div>
    <div *ngIf="showPercentage && statistic.percentage !== undefined" class="progress mt-2">
      <div class="progress-bar" 
           [style.width.%]="statistic.percentage"
           [style.background-color]="statistic.color">
      </div>
    </div>
  </div>
</div>
