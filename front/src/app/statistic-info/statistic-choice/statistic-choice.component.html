<div class="card mb-4">
  <div class="card-body">
    <div class="row">
      <div class="col-md-3">
        <label class="form-label">Тип статистики</label>
        <select class="form-select" [(ngModel)]="selectedType">
          <option [ngValue]="0">По категориям</option>
          <option [ngValue]="1">По способам оплаты</option>
          <option [ngValue]="2">Топ продавцы</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Период</label>
        <select class="form-select" [(ngModel)]="selectedPeriod">
          <option value="7days">Последние 7 дней</option>
          <option value="30days">Последние 30 дней</option>
          <option value="month">Текущий месяц</option>
          <option value="year">Текущий год</option>
          <option value="custom">Произвольный период</option>
        </select>
      </div>
      <div class="col-md-4" *ngIf="selectedPeriod === 'custom'">
        <div class="row">
          <div class="col-md-6">
            <label class="form-label">С</label>
            <input type="date" class="form-control" [(ngModel)]="startDate">
          </div>
          <div class="col-md-6">
            <label class="form-label">По</label>
            <input type="date" class="form-control" [(ngModel)]="endDate">
          </div>
        </div>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" (click)="onSearch()">
          Поиск
        </button>
      </div>
    </div>
  </div>
</div>
